<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMPLE PACK | Nômade Record's</title>
<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 16px;
  padding-bottom: 120px;
}

/* HEADER */
h1 {
  text-align: center;
  font-size: 26px;
  text-transform: uppercase;
}

/* SAMPLE CARD */
.beat {
  background: rgba(255,255,255,0.03);
  padding: 20px;
  border-radius: 24px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.3s;
}

.beat:hover {
  background: rgba(255,255,255,0.06);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* BOTÃO PLAY */
.play-btn {
  background: #65c1fb;
  border: none;
  border-radius: 50%;
  width: 38px;
  height: 38px;
  cursor: pointer;
  position: relative;
}

.play-btn::before {
  content: "";
  border-left: 10px solid #000;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  position: absolute;
  left: 14px;
  top: 13px;
}

.play-btn.playing::before {
  border: none;
  width: 10px;
  height: 12px;
  border-left: 3px solid #000;
  border-right: 3px solid #000;
  left: 13px;
}

/* DOWNLOAD BONITO */
.download-btn {
  background: #2ecc71;
  color: #000;
  border: none;
  padding: 6px 14px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  font-size: 12px;
}

.waveform {
  margin-top: 15px;
}

/* LOCKED */
.locked {
  text-align: center;
  margin: 40px 0;
  padding: 30px;
  background: #111;
  border: 1px dashed #333;
  border-radius: 28px;
}

/* MODAL */
.modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content {
  background:#111;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:350px;
}

.modal-content input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

.modal-content button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#65c1fb;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>SAMPLE PACK PREMIUM</h1>

  <div id="beats"></div>

  <div class="locked">
    <h2>🔒 Desbloqueie o Pack Completo</h2>
    <p>Leve todos os samples em alta qualidade (WAV)</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Baixar sample grátis</h2>
    <p>Digite seus dados para liberar</p>
    <input type="text" id="nome" placeholder="Seu nome">
    <input type="email" id="email" placeholder="Seu e-mail">
    <button onclick="liberarDownload()">LIBERAR DOWNLOAD</button>
  </div>
</div>

<script>
const sampleList = [
  { 
    name: "obliviate", 
    display: "OBLIVIATE", 
    fileName: "Obliviate - 140 bpm - Am (@apzin.mix).wav",
    free: true 
  },
  { 
    name: "momentum", 
    display: "MOMENTUM", 
    fileName: "Momentum - 120 bpm - Fm (@apzin.mix).wav",
    free: true 
  },
  { 
    name: "patronum", 
    display: "PATRONUM", 
    fileName: "Patronum - 150 bpm - Gm (@apzin.mix).wav",
    free: true 
  }
];

let selectedFile = "";
let selectedFileName = "";
let players = [];
let current = null;

const container = document.getElementById("beats");

sampleList.forEach((s, i) => {
  container.innerHTML += `
    <div class="beat" id="row-${i}">
      <div class="top">
        <strong>${s.display}</strong>
        <div style="display:flex; gap:10px;">
          <button class="download-btn" onclick="abrirModal('${s.name}', '${s.fileName}')">BAIXAR</button>
          <button class="play-btn" id="btn-${i}" onclick="playSample(${i})"></button>
        </div>
      </div>
      <div id="waveform-${i}" class="waveform"></div>
    </div>
  `;
});

function abrirModal(file, fileName){
  selectedFile = file;
  selectedFileName = fileName;
  document.getElementById("modal").style.display = "flex";
}

function liberarDownload(){
  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;

  if(!nome || !email){
    alert("Preencha todos os campos");
    return;
  }

  const formURL = "https://docs.google.com/forms/d/e/1FAIpQLScXwpFyh8UYRnRsnoLKwFKaGO78hnuHTztNsC1sNpeKVteeiA/formResponse";
  const formData = new FormData();

  formData.append("entry.1591479266", nome);
  formData.append("entry.903292203", email);

  fetch(formURL, {
    method: "POST",
    mode: "no-cors",
    body: formData
  }).then(() => {
    const link = document.createElement("a");
    link.href = "samples/" + selectedFile + ".wav";
    link.download = selectedFileName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
}

function playSample(index){
  if(current !== null && current !== index){
    players[current].pause();
    document.getElementById(`btn-${current}`).classList.remove("playing");
  }

  players[index].playPause();
  current = index;

  document.getElementById(`btn-${index}`).classList.toggle("playing");
}

function createPlayer(index, url) {
  const wave = WaveSurfer.create({
    container: '#waveform-' + index,
    waveColor: '#444',
    progressColor: '#65c1fb',
    height: 45,
    barWidth: 2,
    barGap: 3,
    cursorWidth: 0
  });

  wave.load(url);
  players[index] = wave;
}

sampleList.forEach((s, i) => {
  createPlayer(i, "preview/" + s.name + ".mp3");
});
</script>

</body>
</html>
