html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 16px;
  padding-bottom: 120px;
}

.logo {
  display: block;
  margin: 20px auto;
  height: 80px;
  filter: drop-shadow(0 5px 15px rgba(101,193,251,0.3));
}

h1 {
  text-align: center;
  font-size: 26px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.subtitle {
  text-align: center;
  color: #bbb;
  margin-bottom: 20px;
  font-size: 14px;
}

.cover {
  width: 100%;
  max-height: 168px;
  object-fit: cover;
  object-position: center;
  border-radius: 24px;
  margin-bottom: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 25px rgba(101,193,251,0.15);
}

.price {
  text-align: center;
  margin-bottom: 35px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.old {
  text-decoration: line-through;
  color: #ff4d4d;
  font-size: 20px;
  font-weight: bold;
  opacity: 0.8;
}

.new {
  font-size: 36px;
  color: #2ecc71;
  font-weight: 900;
  margin-top: 5px;
}

.cta {
  display: block;
  text-align: center;
  background: #65c1fb;
  color: #000;
  padding: 18px;
  border-radius: 20px;
  margin: 20px 0;
  text-decoration: none;
  font-weight: 800;
  transition: all 0.3s ease;
  text-transform: uppercase;
}

.cta:hover {
  background: #fff;
  transform: scale(1.02);
}

.beat {
  background: rgba(255,255,255,0.03);
  padding: 20px;
  border-radius: 24px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.3s;
  cursor: pointer;
}

.beat:hover {
  background: rgba(255,255,255,0.06);
}

.beat.active {
  border: 1px solid #65c1fb;
  background: rgba(101,193,251,0.05);
  box-shadow: 0 0 20px rgba(101,193,251,0.2);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.play-btn {
  background: #65c1fb;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
  position: relative;
}

.play-btn::before {
  content: "";
  display: block;
  width: 0;
  height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-left: 10px solid #000;
  margin-left: 3px;
}

.play-btn.playing::before {
  border: none;
  width: 10px;
  height: 12px;
  border-left: 3px solid #000;
  border-right: 3px solid #000;
  margin-left: 0;
}

.info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #888;
  font-size: 12px;
  margin-top: 8px;
  font-weight: bold;
}

.time-display {
  color: #65c1fb;
  font-family: monospace;
  font-size: 13px;
}

.waveform {
  margin-top: 15px;
}
