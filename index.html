<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMPLE PACK | Nômade Record's</title>
<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 16px;
  padding-bottom: 120px;
}

.logo {
  display: block;
  margin: 20px auto;
  height: 80px;
  filter: drop-shadow(0 5px 15px rgba(101,193,251,0.3));
}

h1 { text-align: center; font-size: 26px; text-transform: uppercase; }

.subtitle {
  text-align: center;
  color: #bbb;
  margin-bottom: 20px;
}

.cover {
  width: 100%;
  max-height: 168px;
  object-fit: cover;
  border-radius: 24px;
  margin-bottom: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 25px rgba(101,193,251,0.15);
}

.price { text-align: center; margin-bottom: 35px; }
.old { text-decoration: line-through; color: #ff4d4d; }
.new { font-size: 36px; color: #2ecc71; font-weight: 900; }

.cta {
  display: block;
  text-align: center;
  background: #65c1fb;
  color: #000;
  padding: 18px;
  border-radius: 20px;
  margin: 20px 0;
  text-decoration: none;
  font-weight: 800;
  text-transform: uppercase;
  transition: 0.3s;
}
.cta:hover { background: #fff; transform: scale(1.02); }

.beat {
  background: rgba(255,255,255,0.03);
  padding: 20px;
  border-radius: 24px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.3s;
  cursor: pointer;
}

.beat:hover {
  background: rgba(255,255,255,0.06);
  transform: translateY(-3px);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.play-btn {
  background: #65c1fb;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.play-btn::before {
  content: "";
  border-left: 10px solid #000;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
}

.play-btn.playing::before {
  border: none;
  width: 10px;
  height: 12px;
  border-left: 3px solid #000;
  border-right: 3px solid #000;
}

.download-btn {
  background: #2ecc71;
  color: #000;
  border: none;
  padding: 6px 14px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  transition:0.3s;
}

.download-btn.liberado {
  background: #f1c40f;
}

.waveform { margin-top: 15px; }

.locked {
  text-align: center;
  margin: 40px 0;
  padding: 30px;
  background: #111;
  border: 1px dashed #333;
  border-radius: 28px;
}

/* CTA FIXO ORIGINAL */
.fixed-cta {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  max-width: 450px;
  background: #2ecc71;
  text-align: center;
  padding: 18px;
  font-weight: 900;
  color: #000;
  text-decoration: none;
  border-radius: 22px;
  z-index: 9999;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(46,204,113,0.7); }
  70% { box-shadow: 0 0 0 20px rgba(46,204,113,0); }
  100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
}

/* MODAL CORRIGIDO */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: #111;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <img src="img/logo.png" class="logo">
  <img src="img/capa.jpg" class="cover">

  <h1>SAMPLE PACK PREMIUM</h1>
  <p class="subtitle">Samples profissionais prontos para uso</p>

  <div id="beats"></div>

  <div class="locked">
    <h2>🔒 Você só viu uma parte...</h2>
  </div>
</div>

<a class="fixed-cta" href="#">COMPRAR AGORA</a>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Baixar sample grátis</h2>
    <input id="nome" placeholder="Seu nome">
    <input id="email" placeholder="Seu e-mail">
    <button onclick="liberarDownload()">LIBERAR</button>
  </div>
</div>

<script>
let selectedFile="", selectedFileName="", selectedBtn=null;

function handleDownload(btn,file,name){
  selectedFile=file;
  selectedFileName=name;
  selectedBtn=btn;

  if(btn.classList.contains("liberado")){
    baixar();
    return;
  }

  document.getElementById("modal").classList.add("active");
}

function liberarDownload(){
  selectedBtn.classList.add("liberado");
  document.getElementById("modal").classList.remove("active");
}

function baixar(){
  const link=document.createElement("a");
  link.href="samples/"+selectedFile+".wav";
  link.download=selectedFileName;
  link.click();
}

window.onclick=function(e){
  if(e.target.id==="modal"){
    document.getElementById("modal").classList.remove("active");
  }
}
</script>

</body>
</html>
