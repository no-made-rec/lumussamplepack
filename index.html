<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMPLE PACK | Nômade Record's</title>
<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 16px;
  padding-bottom: 120px;
}

.logo {
  display: block;
  margin: 20px auto;
  height: 80px;
  filter: drop-shadow(0 5px 15px rgba(101,193,251,0.3));
}

h1 {
  text-align: center;
  font-size: 26px;
  text-transform: uppercase;
}

.subtitle {
  text-align: center;
  color: #bbb;
  margin-bottom: 20px;
}

.cover {
  width: 100%;
  max-height: 168px;
  object-fit: cover;
  border-radius: 24px;
  margin-bottom: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.8);
}

.price {
  text-align: center;
  margin-bottom: 35px;
}

.old {
  text-decoration: line-through;
  color: #ff4d4d;
}

.new {
  font-size: 36px;
  color: #2ecc71;
  font-weight: 900;
}

.cta {
  display: block;
  text-align: center;
  background: #65c1fb;
  color: #000;
  padding: 18px;
  border-radius: 20px;
  margin: 20px 0;
  text-decoration: none;
  font-weight: 800;
  text-transform: uppercase;
}

.beat {
  background: rgba(255,255,255,0.03);
  padding: 20px;
  border-radius: 24px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.05);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.play-btn {
  background: #65c1fb;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  position: relative;
}

.play-btn::before {
  content: "";
  border-left: 10px solid #000;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  position: absolute;
  left: 15px;
  top: 13px;
}

.play-btn.playing::before {
  border: none;
  width: 10px;
  height: 12px;
  border-left: 3px solid #000;
  border-right: 3px solid #000;
}

.download-btn {
  background: #2ecc71;
  color: #000;
  border: none;
  padding: 6px 14px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.waveform {
  margin-top: 15px;
}

.locked {
  text-align: center;
  margin: 40px 0;
  padding: 30px;
  background: #111;
  border: 1px dashed #333;
  border-radius: 28px;
}

.fixed-cta {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  max-width: 450px;
  background: #2ecc71;
  text-align: center;
  padding: 18px;
  font-weight: 900;
  color: #000;
  text-decoration: none;
  border-radius: 22px;
  z-index: 9999;
}

/* MODAL */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:350px;
}

.modal-content input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
  <img src="img/logo.png" class="logo">
  <img src="img/capa.jpg" class="cover">

  <h1>SAMPLE PACK PREMIUM</h1>
  <p class="subtitle">Samples profissionais prontos para uso</p>

  <div class="price">
    <div class="old">De R$ 79,90</div>
    <div class="new">R$ 29</div>
  </div>

  <a class="cta" href="#">QUERO O PACK COMPLETO</a>

  <div id="beats"></div>

  <div class="locked">
    <h2>🔒 Desbloqueie todos os samples</h2>
  </div>

</div>

<a class="fixed-cta" href="#">COMPRAR AGORA</a>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Baixar sample grátis</h2>
    <input type="text" id="nome" placeholder="Seu nome">
    <input type="email" id="email" placeholder="Seu e-mail">
    <button onclick="liberarDownload()">LIBERAR</button>
  </div>
</div>

<script>
const sampleList = [
  { name:"obliviate", display:"OBLIVIATE", fileName:"Obliviate - 140 bpm - Am (@apzin.mix).wav", free:true },
  { name:"momentum", display:"MOMENTUM", fileName:"Momentum - 120 bpm - Fm (@apzin.mix).wav", free:true },
  { name:"patronum", display:"PATRONUM", fileName:"Patronum - 150 bpm - Gm (@apzin.mix).wav", free:true }
];

let selectedFile="", selectedFileName="";
let players=[], current=null;

const container=document.getElementById("beats");

sampleList.forEach((s,i)=>{
  container.innerHTML+=`
  <div class="beat">
    <div class="top">
      <strong>${s.display}</strong>
      <div style="display:flex; gap:10px;">
        <button class="download-btn" onclick="abrirModal('${s.name}','${s.fileName}')">BAIXAR</button>
        <button class="play-btn" id="btn-${i}" onclick="playSample(${i})"></button>
      </div>
    </div>
    <div id="waveform-${i}" class="waveform"></div>
  </div>`;
});

function abrirModal(f,n){
  selectedFile=f;
  selectedFileName=n;
  document.getElementById("modal").style.display="flex";
}

function liberarDownload(){
  const nome=document.getElementById("nome").value;
  const email=document.getElementById("email").value;

  const formData=new FormData();
  formData.append("entry.1591479266", nome);
  formData.append("entry.903292203", email);

  fetch("https://docs.google.com/forms/d/e/1FAIpQLScXwpFyh8UYRnRsnoLKwFKaGO78hnuHTztNsC1sNpeKVteeiA/formResponse",{
    method:"POST",
    mode:"no-cors",
    body:formData
  }).then(()=>{
    const link=document.createElement("a");
    link.href="samples/"+selectedFile+".wav";
    link.download=selectedFileName;
    link.click();
  });
}

function playSample(i){
  if(current!==null&&current!==i){
    players[current].pause();
    document.getElementById("btn-"+current).classList.remove("playing");
  }
  players[i].playPause();
  current=i;
  document.getElementById("btn-"+i).classList.toggle("playing");
}

function createPlayer(i,url){
  const wave=WaveSurfer.create({
    container:"#waveform-"+i,
    waveColor:"#444",
    progressColor:"#65c1fb",
    height:45
  });
  wave.load(url);
  players[i]=wave;
}

sampleList.forEach((s,i)=>{
  createPlayer(i,"preview/"+s.name+".mp3");
});
</script>

</body>
</html>
